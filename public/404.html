<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Purchase Request App</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirects all 404s back to index.html so React can handle routing
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var base = '/purchase-request-app';
      var redirectUrl = base + '/?p=' + encodeURIComponent(path.replace(base, '') + search) + hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
